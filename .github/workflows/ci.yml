name: CI/CD

on:
  push:
  pull_request:

jobs:
  # -------------------------------------------------------------------------
  # Run backend tests
  # -------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Add FRCM to PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)/third_party/dynamic-frcm-simple/src" >> $GITHUB_ENV

      - name: Syntax check
        run: python -m compileall -q backend/app

      - name: Run backend tests
        run: python -m pytest backend/tests -q

  # -------------------------------------------------------------------------
  # Build the Docker image to confirm it assembles correctly
  # -------------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t fireguard-backend:ci .

  # -------------------------------------------------------------------------
  # Deploy to NREC VM on push to main
  #
  # Required repository secrets (Settings → Secrets → Actions):
  #   NREC_HOST     — public IP or hostname of your NREC instance
  #   NREC_USER     — SSH user (typically "ubuntu" or "debian")
  #   NREC_SSH_KEY  — contents of the private key used when creating the instance
  # -------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy to NREC via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NREC_HOST }}
          username: ${{ secrets.NREC_USER }}
          key: ${{ secrets.NREC_SSH_KEY }}
          script: |
            cd ~/fireguard-cloud
            git pull --recurse-submodules
            docker compose down
            docker compose up -d --build
            docker compose ps

      - name: Health check
        run: |
          sleep 15
          curl --fail http://${{ secrets.NREC_HOST }}:8000/health
